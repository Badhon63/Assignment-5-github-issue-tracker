<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>
  <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: "Poppins", sans-serif;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 bg-base-200">

  <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-300">
    <div class="card-body items-center text-center">

      <img src="assets/github-logo.png" alt="GitHub logo" class="w-16 h-16 object-contain mx-auto">

      <h2 class="card-title text-2xl font-bold text-center tracking-tight">
        GitHub Issues Tracker
      </h2>

      <p class="text-base-content/70 text-center text-sm mb-2">
        Sign in to manage your issues
      </p>

      <form id="loginForm" class="w-full">
        <div class="form-control w-full">
          <label class="label py-1 flex" for="username"><span class="label-text font-medium">Username</span></label>
          <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full">
          <label class="label py-1 flex"><span class="label-text-alt text-primary text-sm">Default: admin</span></label>
        </div>
        <div class="form-control w-full mt-1">
          <label class="label py-1 flex" for="password"><span class="label-text font-medium">Password</span></label>
          <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full">
          <label class="label py-1 flex"><span class="label-text-alt text-primary text-sm">Default:
              admin123</span></label>
        </div>
        <div class="form-control mt-6"><button id="submitbtn" type="button" class="btn btn-primary w-full">Sign In</button></div>
      </form>

      <div class="divider text-xs text-base-content/40 my-3">OR</div>

      <div class="bg-base-200 p-4 rounded-lg border border-base-300 w-full text-center">
        <p class="font-semibold text-base mb-2">Demo Credentials:</p>
        <div class="text-sm space-y-1">
          <p><span class="font-medium">Username:</span> admin</p>
          <p><span class="font-medium">Password:</span> admin123</p>
        </div>
      </div>

    </div>
  </div>

  <script src="scripts/login.js"></script>

</body>

</html>

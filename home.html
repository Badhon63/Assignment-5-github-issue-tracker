<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker</title>
  <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: "Poppins", sans-serif;
    }
  </style>
</head>

<body class="bg-base-200">

  <header id="navbar" class="navbar bg-base-100 shadow-sm px-8">
    <div class="flex-1 flex items-center gap-2">
      <img src="assets/github-logo.png" class="w-8">
      <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
    </div>
    <div class="flex gap-4">
      <input type="text" placeholder="Search issues..." class="input input-bordered w-60">
      <button class="btn btn-primary">+ New Issue</button>
    </div>
  </header>

  <section id="filter" class="max-w-6xl mx-auto mt-8">
    <div class="tabs tabs-boxed bg-base-100 p-4 shadow space-x-2">
      <button class="btn btn-primary w-[100px]">All</button>
      <button class="btn btn-outline w-[100px]">Open</button>
      <button class="btn btn-outline w-[100px]">Closed</button>
    </div>
  </section>

  <div class="max-w-6xl mx-auto mt-6">

    <div class="bg-base-100 p-6 rounded-lg shadow">
      <div class="flex justify-between mb-6 border-b-2 border-gray-200 pb-4">

        <div class="flex items-center justify-center gap-3">
          <img src="assets/Aperture.png" alt="" class="bg-purple-200 p-2 rounded-full">
          <div>
            <h2 class="text-xl font-bold">50 Issues</h2>
            <p class="text-sm opacity-70">Track and manage your project issues</p>
          </div>
        </div>

        <div class="text-sm flex items-center gap-4">
          <span class="text-green-600">● Open</span>
          <span class="text-red-500">● Closed</span>
        </div>

      </div>
      <div id="container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

  </div>

  <script src="scripts/machine.js"></script>
</body>

</html>
